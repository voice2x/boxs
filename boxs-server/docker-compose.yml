services:
  postgres:
    image: docker.m.daocloud.io/postgres:latest
    environment:
      POSTGRES_DB: boxs
      POSTGRES_USER: ${POSTGRES_USER:-boxs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-boxs}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT:-7458}:5432"
    networks:
      - boxs-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boxs"]
      interval: 5s
      retries: 5

  server:
    build: .
    ports:
      - "7455:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - boxs-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      retries: 3

volumes:
  pgdata: 
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /root/apps/mini-devops/postgres

networks:
  boxs-net:
    driver: bridge
