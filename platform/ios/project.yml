name: Boxs
options:
  bundleIdPrefix: com.boxs
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  Starscream:
    url: https://github.com/daltoniam/Starscream
    from: "4.0.0"

targets:
  Boxs:
    type: application
    platform: iOS
    sources:
      - Boxs
    resources:
      - path: Boxs/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.boxs.app
        INFOPLIST_FILE: Boxs/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: GRDB
      - package: Starscream
    entitlements:
      path: Boxs/Boxs.entitlements
      properties:
        com.apple.security.app-sandbox: false

  BoxsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BoxsTests
    dependencies:
      - target: Boxs
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.boxs.app.tests
        GENERATE_INFOPLIST_FILE: "YES"

  BoxsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - BoxsUITests
    dependencies:
      - target: Boxs
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.boxs.app.uitests
        GENERATE_INFOPLIST_FILE: "YES"
